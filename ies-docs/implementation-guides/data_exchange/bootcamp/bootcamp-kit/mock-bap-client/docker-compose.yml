# IES Bootcamp — Local BAP
#
# Runs your own ONIX BAP adapter locally.
# Outbound requests go through your BAP (real beckn signing).
# Responses are fetched via poll mode from mock-bpp's response store.
#
# Usage:
#   docker compose up -d
#   python bap_client.py --usecase all
#
# To point to a different BPP server, edit:
#   config/routing-BAPCaller.yaml → change the target url

services:
  redis:
    image: redis:alpine
    container_name: bootcamp-redis
    # No host port — only onix-bap needs Redis, not the host
    networks:
      - bap_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-bap:
    image: fidedocker/onix-adapter:latest
    container_name: bootcamp-onix-bap
    platform: linux/amd64
    networks:
      - bap_network
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CONFIG_FILE: "/app/config/bap.yaml"
      REDIS_ADDR: redis:6379
    volumes:
      - ./config:/app/config
    command: ["./server", "--config=/app/config/bap.yaml"]
    depends_on:
      redis:
        condition: service_healthy

networks:
  bap_network:
    name: bap_network
    driver: bridge

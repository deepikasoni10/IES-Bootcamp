# BAP Caller Routing — sends requests to the remote BPP
#
# Change the URL below to point to your BPP server.
# Default points to the IES Bootcamp GCP server.
#
# discover/publish go to the same BPP (mock DEDI is hosted there).
# In production, discover would go to DEDI (fabric.nfh.global).

routingRules:
  - domain: "nfh.global/testnet-deg"
    version: "2.0.0"
    targetType: "url"
    target:
      url: "http://34.180.51.14:8082/bpp/receiver"
    endpoints:
      - discover
      - publish
      - select
      - init
      - confirm
      - status
      - track
      - cancel
      - update
      - rate
      - support

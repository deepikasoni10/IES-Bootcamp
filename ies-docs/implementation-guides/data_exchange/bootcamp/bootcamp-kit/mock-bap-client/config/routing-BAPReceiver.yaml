# BAP Receiver Routing — delivers on_* callbacks to your bap_client.py
#
# host.docker.internal resolves to your machine from inside Docker (Mac/Windows).
# On Linux, use --add-host=host.docker.internal:host-gateway in docker-compose.

routingRules:
  - domain: "nfh.global/testnet-deg"
    version: "2.0.0"
    targetType: "url"
    target:
      url: "http://host.docker.internal:9000/callback"
    endpoints:
      - on_discover
      - on_select
      - on_init
      - on_confirm
      - on_status
      - on_update
      - on_cancel
      - on_track
      - on_rate
      - on_support

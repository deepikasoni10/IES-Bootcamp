routingRules:
  - domain: "nfh.global/testnet-deg"
    version: "2.0.0"
    targetType: "url"
    target:
      # Routes on_* callbacks to sandbox-bap which logs them.
      # Poll mode reads responses from mock-bpp's /api/responses instead.
      url: "http://sandbox-bap:3001/api/bap-webhook"
    endpoints:
      - on_discover
      - on_select
      - on_init
      - on_confirm
      - on_status
      - on_update
      - on_cancel
      - on_track
      - on_rate
      - on_support
